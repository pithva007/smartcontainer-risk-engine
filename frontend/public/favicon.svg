<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rounded background -->
  <rect width="100" height="100" rx="18" fill="#0f1f2e"/>

  <!-- ── Isometric container ── -->
  <!-- Top face -->
  <polygon points="55,10 86,27 55,44 24,27" fill="#22d3ee"/>
  <polygon points="55,10 86,27 55,44 24,27" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.6"/>

  <!-- Right face (darker) -->
  <polygon points="86,27 86,66 55,83 55,44" fill="#0e7490"/>
  <line x1="68" y1="47" x2="76" y2="70"  stroke="#155e75" stroke-width="4" stroke-linecap="round"/>
  <line x1="78" y1="41" x2="85" y2="64"  stroke="#155e75" stroke-width="4" stroke-linecap="round"/>

  <!-- Front-left face (mid tone) -->
  <polygon points="24,27 24,66 55,83 55,44" fill="#0891b2"/>
  <line x1="24" y1="27" x2="24" y2="66" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>

  <!-- ── Neural branches (orange) from left corner ── -->
  <circle cx="24" cy="46" r="4" fill="#fb923c"/>

  <line x1="24" y1="46" x2="10" y2="18" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="46" x2="5"  y2="34" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="46" x2="4"  y2="52" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="46" x2="8"  y2="68" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="46" x2="18" y2="82" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>

  <circle cx="10" cy="18" r="5" fill="#fb923c"/>
  <circle cx="5"  cy="34" r="5" fill="#fb923c"/>
  <circle cx="4"  cy="52" r="5" fill="#fb923c"/>
  <circle cx="8"  cy="68" r="5" fill="#fb923c"/>
  <circle cx="18" cy="82" r="5" fill="#fb923c"/>
</svg>
